# Profile: lpjg_legacy_v1
# ========================
# Reproduces the policy of the legacy `hildap_tables.py` script (the original
# v1/HPC pipeline). Differs from the v3 default in two ways:
#
# 1. Sparse/barren (HILDA+ code 66) is BARREN, not NATURAL.
# 2. CROPLAND uses only annual crops (code 22); HILDA+ v2's tree-crop (23)
#    and agroforestry (24) codes are absent because the legacy script was
#    written before HILDA+ v2 introduced them. Tree crops and agroforestry
#    are therefore (by omission) treated as missing in this profile.
#
# Use via:  --mapping-profile lpjg_legacy_v1
#           or LANDSYMM_LANDCOVER_PROFILE=lpjg_legacy_v1

profile:
  name: "lpjg_legacy_v1"
  description: >
    Legacy hildap_tables.py policy. Sparse/barren → BARREN; CROPLAND uses
    only HILDA+ code 22 (no tree crops or agroforestry).
  source: "HILDA+ v1 (legacy)"
  source_reference: "Wittenbrink et al., as used in the original landsymm_mat MATLAB pipeline"

hilda_classes:
  ocean: [0]
  urban: [11]
  annual_crops: [22]
  # tree_crops and agroforestry omitted — legacy data has no codes 23/24
  pasture: [33]
  forest_unmanaged: [40, 41, 42, 43, 44, 45]
  forest_managed:   [400, 410, 420, 430, 440, 450]
  grassland_shrubland: [55]
  sparse_barren: [66]
  water: [77]
  nodata: [99]

lpjguess_categories:
  combined:
    URBAN:    [urban]
    CROPLAND: [annual_crops]
    PASTURE:  [pasture]
    FOREST:   [forest_unmanaged, forest_managed]
    NATURAL:  [grassland_shrubland]
    BARREN:   [ocean, water, nodata, sparse_barren]
  split:
    URBAN:            [urban]
    CROPLAND:         [annual_crops]
    PASTURE:          [pasture]
    FOREST_MANAGED:   [forest_managed]
    FOREST_UNMANAGED: [forest_unmanaged]
    NATURAL:          [grassland_shrubland]
    BARREN:           [ocean, water, nodata, sparse_barren]

forest_types:
  combined:
    ForestNE:  [41, 410]
    ForestND:  [43, 430]
    ForestBE:  [42, 420]
    ForestBD:  [44, 440]
    ForestPNV: [40, 45, 400, 450]
  managed:
    ForestNE_MANAGED:  [410]
    ForestND_MANAGED:  [430]
    ForestBE_MANAGED:  [420]
    ForestBD_MANAGED:  [440]
    ForestPNV_MANAGED: [400, 450]
  unmanaged:
    ForestNE_UNMANAGED:  [41]
    ForestND_UNMANAGED:  [43]
    ForestBE_UNMANAGED:  [42]
    ForestBD_UNMANAGED:  [44]
    ForestPNV_UNMANAGED: [40, 45]

forest_management_codes:
  no_forest: 0
  managed:   1
  unmanaged: 2

output:
  dlon: 0.5
  dlat: 0.5
  precision: 7
